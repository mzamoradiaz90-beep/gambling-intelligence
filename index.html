<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambling Intelligence — Panel Ejecutivo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4af37;--dark:#1a1a2e;--dark2:#16213e;--bg:#f8f7f4;--card:#ffffff;--text:#1a1a2e;--text2:#5a5a72;--text3:#9a9ab0;--border:rgba(26,26,46,0.1);--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-name{color:white;font-size:16px;font-weight:500;}
.logo-sub{color:rgba(255,255,255,0.4);font-size:12px;}
.date-badge{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);}
.container{max-width:900px;margin:0 auto;padding:2rem 1.5rem;}
.exec-info{font-size:13px;color:var(--text3);margin-bottom:1.5rem;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem;}
.stat{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1rem 1.25rem;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:500;color:var(--text);}
.news-list{display:flex;flex-direction:column;gap:1.25rem;}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.card:hover{border-color:rgba(212,175,55,0.4);}
.card-body{padding:1.25rem;}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;}
.cat-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
.cat-regulacion{background:#E6F1FB;color:#0C447C;}
.cat-mercado{background:#EAF3DE;color:#3B6D11;}
.cat-tecnologia{background:#EEEDFE;color:#3C3489;}
.cat-fusiones{background:#FAEEDA;color:#854F0B;}
.cat-deportes{background:#E1F5EE;color:#0F6E56;}
.cat-default{background:#F1EFE8;color:#5F5E5A;}
.region{font-size:11px;color:var(--text3);}
.card-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);line-height:1.4;margin-bottom:.75rem;}
.card-summary{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1rem;}
.points-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.point{display:flex;gap:8px;font-size:13px;color:var(--text2);margin-bottom:5px;line-height:1.5;}
.point-bullet{color:var(--gold);flex-shrink:0;}
.card-actions{display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--border);margin-top:1rem;}
.source-link{font-size:12px;color:var(--text3);text-decoration:none;}
.source-link:hover{color:var(--text2);}
.actions-right{display:flex;gap:8px;}
.copy-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;background:#0077b5;color:white;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.copy-btn.copied{background:#22c55e;}
.post-preview{background:#f8f7f4;border-radius:8px;padding:1rem;margin-top:1rem;font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap;border:1px solid var(--border);display:none;}
.toggle-post-btn{padding:7px 14px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div><div class="logo-name">Gambling Intelligence</div><div class="logo-sub">Panel ejecutivo global</div></div>
  </div>
  <div class="date-badge">sábado, 30 de mayo de 2026</div>
</div>
<div class="container">
  <div class="exec-info">Actualizado automáticamente por n8n · 1 noticias analizadas</div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Noticias</div><div class="stat-value">1</div></div>
    <div class="stat"><div class="stat-label">Categorías</div><div class="stat-value">1</div></div>
    <div class="stat"><div class="stat-label">Regiones</div><div class="stat-value">1</div></div>
  </div>
  <div class="news-list">
  <div class="card">
    <div class="card-img" style="background-image:url('https://image.pollinations.ai/prompt/gambling%20casino%20betting%20%20executive%20professional%20dark%20elegant?width=900&height=200&nologo=true&seed=0');background-size:cover;background-position:center;position:relative;height:160px;">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom, rgba(26,26,46,0.3) 0%, rgba(26,26,46,0.7) 100%);display:flex;align-items:flex-end;padding:12px 16px;">
        <div>
          <div style="font-size:13px;color:#d4af37;font-weight:500;line-height:1.4;"></div>
          <div style="font-size:10px;color:rgba(212,175,55,0.6);margin-top:3px;">Gambling Intelligence · Análisis Ejecutivo</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <span class="cat-tag cat-default">General</span>
        <span class="region">🌎 </span>
      </div>
      <div class="card-title"></div>
      <div class="card-summary"></div>
      <div class="points-label">Puntos clave</div>
      
      <div class="card-actions">
        <a href="#" class="source-link" target="_blank" rel="noopener">↗ Ver fuente</a>
        <div class="actions-right">
          <button class="toggle-post-btn" onclick="togglePost(0)">Ver post</button>
          <button class="copy-btn" id="copy-btn-0" onclick="copyPost(0, '')">in Copiar post</button>
        </div>
      </div>
      <div class="post-preview" id="post-0"></div>
    </div>
  </div></div>
</div>
<script>
function togglePost(i){const el=document.getElementById('post-'+i);el.style.display=el.style.display==='block'?'none':'block';}
function copyPost(i,enc){const text=decodeURIComponent(enc);navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById('copy-btn-'+i);btn.textContent='✓ Copiado';btn.classList.add('copied');setTimeout(()=>{btn.textContent='in Copiar post';btn.classList.remove('copied');},2500);});}
</script>
</body>
</html>
